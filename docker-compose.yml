services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:5002/api/v1
    container_name: ff-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ff-backend
    env_file:
      - ./backend/environment/development.env
    ports:
      - "5002:5002"
    restart: unless-stopped
